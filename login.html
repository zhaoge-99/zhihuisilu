<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧丝路 · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== 古风汉字风格 — 智慧丝路 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Serif SC','Ma Shan Zheng','STSong',serif;
  background:#F5F0E1;
  color:#2C2C2C;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ===== 宣纸纹理背景 ===== */
.bg-canvas{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
  /* 宣纸纹理 — 用重复渐变模拟手工纸纤维感 */
  background:
    /* 竖纹纤维 */
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(139,119,90,.03) 2px,
      rgba(139,119,90,.03) 4px
    ),
    /* 横纹纤维 */
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(139,119,90,.02) 3px,
      rgba(139,119,90,.02) 5px
    ),
    /* 宣纸底色斑驳 */
    repeating-linear-gradient(
      45deg,
      #F5F0E1 0px,
      #F0E8D5 2px,
      #F5F0E1 4px,
      #EDE4CF 6px,
      #F5F0E1 8px
    );
  background-size: 4px 4px, 5px 5px, 8px 8px;
}

/* 大型毛笔"学"字水印装饰 */
.bg-canvas::before{
  content:'学';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-8deg);
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:360px;
  font-weight:900;
  color:rgba(194,59,34,.04);
  pointer-events:none;
  user-select:none;
  letter-spacing:0;
  line-height:1;
}

/* 隐藏原有的毛玻璃光晕和网格 */
.bg-canvas .orb{display:none}
.bg-canvas::after{display:none}

/* 浮动装饰 — 改为古风印章小点 */
.floating-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.15}
.floating-shapes .shape{
  position:absolute;border-radius:0;
  border:1px solid #C23B22;
  background:transparent;
  animation:shapeFloat 40s linear infinite;
}
.floating-shapes .shape:nth-child(1){
  width:24px;height:24px;
  top:15%;left:8%;
  border:2px solid #C23B22;
  animation-duration:35s;
  transform:rotate(45deg);
}
.floating-shapes .shape:nth-child(2){
  width:16px;height:16px;
  top:55%;left:75%;
  border:2px solid #C89B3C;
  animation-duration:40s;animation-delay:-8s;
  border-radius:50%;
}
.floating-shapes .shape:nth-child(3){
  width:20px;height:20px;
  top:8%;right:12%;
  border:2px solid #4A6C8F;
  animation-duration:30s;animation-delay:-12s;
  transform:rotate(45deg);
}
.floating-shapes .shape:nth-child(4){
  width:14px;height:14px;
  bottom:30%;left:55%;
  border:2px solid #C89B3C;
  animation-duration:38s;animation-delay:-18s;
  border-radius:50%;
}
.floating-shapes .shape:nth-child(5){
  width:18px;height:18px;
  bottom:45%;right:25%;
  border:2px solid #C23B22;
  animation-duration:32s;animation-delay:-10s;
  transform:rotate(45deg);
}
@keyframes shapeFloat{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  15%{opacity:1}
  85%{opacity:1}
  100%{transform:translateY(-120vh) rotate(360deg);opacity:0}
}

/* ===== 主卡片 — 宣纸质感 ===== */
.login-container{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  padding:20px;
}

.login-card{
  background:#FBF7EF;
  border:2px solid #C89B3C;
  border-radius:0;
  box-shadow:
    0 4px 20px rgba(44,44,44,.08),
    inset 0 0 40px rgba(200,155,60,.04);
  padding:40px 36px 44px;
  position:relative;
  overflow:visible;
}

/* 宣纸卡片的边框装饰 — 传统回纹四角 */
.login-card::before{
  content:'';
  position:absolute;
  top:-1px;left:-1px;right:-1px;bottom:-1px;
  border:1px solid rgba(200,155,60,.25);
  pointer-events:none;
}

/* 侧边毛笔竖线装饰（左侧朱红竖线） */
.login-card::after{
  content:'';
  position:absolute;
  top:24px;left:12px;
  width:3px;
  height:calc(100% - 48px);
  background:linear-gradient(180deg,#C23B22 0%,#C89B3C 60%,transparent 100%);
  border-radius:2px;
  pointer-events:none;
}

/* ===== 品牌标题 ===== */
.brand{
  text-align:center;margin-bottom:32px;
  position:relative;
}
.brand .logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;
  border:2px solid #C23B22;
  background:#FBF7EF;
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:32px;
  margin-bottom:14px;
  color:#C23B22;
  position:relative;
  box-shadow:2px 2px 0 rgba(194,59,34,.15);
  /* 印章效果：方形+微微倾斜 */
}
.brand h1{
  font-family:'ZCOOL QingKe HuangYou','Noto Serif SC',serif;
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#2C2C2C 0%,#5A4A3A 50%,#2C2C2C 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:6px;
  margin-bottom:4px;
}
.brand p{
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:13px;
  background:linear-gradient(135deg,#d4af37 0%,#f9e6a3 50%,#b8860b 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShimmer 4s ease infinite alternate;
  margin-top:6px;font-weight:500;
  letter-spacing:2px;
}

/* 品牌名下的装饰点 */
.brand::after{
  content:'◆';
  display:block;
  color:#C89B3C;
  font-size:8px;
  margin-top:6px;
  letter-spacing:12px;
  opacity:.6;
}
@keyframes goldShimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}

/* ===== 选项卡 ===== */
.tabs{
  display:flex;
  border-bottom:2px solid #C89B3C;
  margin-bottom:28px;
  gap:0;
}
.tab-btn{
  flex:1;padding:10px 0;
  border:none;border-radius:0;
  background:transparent;
  color:#8B7D6B;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:15px;font-weight:600;
  cursor:pointer;transition:all .3s;
  position:relative;
  letter-spacing:4px;
}
.tab-btn.active{
  color:#C23B22;
  background:transparent;
}
.tab-btn.active::after{
  content:'';
  position:absolute;bottom:-2px;left:10%;right:10%;
  height:2px;
  background:#C23B22;
}
.tab-btn:hover:not(.active){color:#2C2C2C}

/* ===== 表单面板 ===== */
.form-panel{display:none;animation:panelIn .4s ease}
.form-panel.active{display:block}
@keyframes panelIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.form-group{margin-bottom:22px;position:relative}
.form-group label{
  display:block;font-size:13px;font-weight:600;
  color:#4A6C8F;margin-bottom:8px;
  letter-spacing:2px;font-family:'Noto Serif SC',serif;
}

/* ===== 传统风格输入框 ===== */
.input-wrap{
  position:relative;
  display:flex;align-items:center;
  background:#FBF7EF;
  border:1px solid #C89B3C;
  border-radius:0;
  transition:all .3s;
  overflow:hidden;
}
.input-wrap:focus-within{
  border-color:#C23B22;
  background:#FFFCF5;
  box-shadow:inset 0 0 0 1px rgba(194,59,34,.1);
}

.input-wrap .input-icon{
  padding:0 0 0 16px;
  font-size:16px;
  color:#8B7D6B;
  transition:color .3s;
  flex-shrink:0;
}
.input-wrap:focus-within .input-icon{
  color:#C23B22;
}

.input-wrap input{
  flex:1;padding:13px 14px 13px 10px;
  border:none;background:none;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:15px;
  color:#2C2C2C;outline:none;
  min-width:0;
}
.input-wrap input::placeholder{
  color:#BFB09A;
  font-family:'Noto Serif SC',serif;
}
.input-wrap input:-webkit-autofill,
.input-wrap input:-webkit-autofill:hover,
.input-wrap input:-webkit-autofill:focus{
  -webkit-text-fill-color:#2C2C2C;
  -webkit-box-shadow:0 0 0 1000px #FFFCF5 inset;
  transition:background-color 5000s;
}

/* 密码切换按钮 */
.pw-toggle{
  padding:0 14px 0 4px;
  background:none;border:none;
  cursor:pointer;font-size:14px;
  color:#BFB09A;
  transition:color .3s;
  flex-shrink:0;
}
.pw-toggle:hover{color:#C23B22}

/* ===== 密码强度条（朱红→金色渐变） ===== */
.pw-strength{
  display:flex;gap:3px;margin-top:10px;
  height:4px;
}
.pw-strength .bar{
  flex:1;height:100%;border-radius:0;
  background:#E5DDCF;
  transition:all .3s;
}
/* 密码强度：朱红到金色渐变 — 从左到右依次加深 */
.pw-strength .bar.active{background:#C23B22}
.pw-strength .bar.active:nth-child(2){background:#BD4428}
.pw-strength .bar.active:nth-child(3){background:#C2642A}
.pw-strength .bar.active:nth-child(4){background:#C89B3C}
.pw-strength-text{
  font-size:12px;color:#8B7D6B;margin-top:6px;
  min-height:18px;transition:color .3s;
  font-family:'Noto Serif SC',serif;
}

/* ===== 表单选项 ===== */
.form-options{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.remember-me{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;font-size:13px;color:#4A6C8F;
  user-select:none;font-family:'Noto Serif SC',serif;
}
.remember-me input[type="checkbox"]{
  display:none;
}
.remember-me .check-box{
  width:18px;height:18px;border-radius:2px;
  border:1px solid #C89B3C;
  background:#FBF7EF;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;flex-shrink:0;
  font-size:10px;color:transparent;
  font-family:serif;
}
.remember-me input:checked + .check-box{
  background:#C23B22;
  border-color:#C23B22;
  color:#FBF7EF;
}

.forgot-link{
  font-size:13px;color:#8B7D6B;
  text-decoration:none;transition:color .3s;
  font-family:'Noto Serif SC',serif;
}
.forgot-link:hover{color:#C23B22}

/* ===== 朱红直角按钮 ===== */
.submit-btn{
  width:100%;padding:15px;
  border:2px solid #C23B22;
  border-radius:0;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:16px;font-weight:700;
  color:#FBF7EF;
  background:#C23B22;
  cursor:pointer;
  transition:all .3s;
  position:relative;
  overflow:hidden;
  letter-spacing:6px;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;
  background:#A8321E;
  opacity:0;transition:opacity .4s;
}
.submit-btn:hover::before{opacity:1}
.submit-btn:hover{
  background:#A8321E;
  box-shadow:2px 2px 0 rgba(44,44,44,.15);
}
.submit-btn:active{
  transform:translate(1px,1px);
  box-shadow:none;
}
.submit-btn span{position:relative;z-index:1}
.submit-btn.loading span{opacity:0}
.submit-btn.loading::after{
  content:'';position:absolute;z-index:2;
  top:50%;left:50%;
  width:20px;height:20px;margin:-10px 0 0 -10px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#FBF7EF;
  border-radius:0;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 信息提示 ===== */
.form-msg{
  display:none;
  padding:10px 14px;border-radius:0;
  font-size:13px;margin-bottom:16px;
  animation:msgSlide .3s ease;
  font-family:'Noto Serif SC',serif;
}
.form-msg.error{
  display:flex;align-items:center;gap:8px;
  background:rgba(194,59,34,.08);
  border:1px solid rgba(194,59,34,.2);
  color:#C23B22;
}
.form-msg.success{
  display:flex;align-items:center;gap:8px;
  background:rgba(74,108,143,.08);
  border:1px solid rgba(74,108,143,.2);
  color:#4A6C8F;
}
@keyframes msgSlide{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== 底部文字 ===== */
.footer-text{
  text-align:center;margin-top:20px;
  font-size:13px;color:#8B7D6B;
  font-family:'Noto Serif SC',serif;
}
.footer-text a{
  color:#C23B22;
  text-decoration:none;font-weight:500;
  transition:color .3s;
}
.footer-text a:hover{color:#A8321E}

/* ===== 印章装饰（注册面板右侧） ===== */
#panel-register .form-group:last-of-type::after{
  content:'印';
  position:absolute;right:-20px;top:50%;
  transform:translateY(-50%) rotate(12deg);
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:14px;
  color:#C23B22;
  border:2px solid #C23B22;
  padding:4px 2px;
  line-height:1;
  opacity:.5;
  pointer-events:none;
}

/* ===== Toast 通知 ===== */
.toast-container{
  position:fixed;top:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:14px 20px;border-radius:0;
  background:#FBF7EF;
  border:1px solid #C89B3C;
  font-family:'Noto Serif SC',serif;
  font-size:14px;font-weight:500;
  color:#2C2C2C;
  display:flex;align-items:center;gap:10px;
  animation:toastIn .4s ease;
  max-width:380px;
  box-shadow:2px 2px 8px rgba(44,44,44,.1);
}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
.toast.success{border-left:3px solid #4A6C8F}
.toast.error{border-left:3px solid #C23B22}
.toast.info{border-left:3px solid #C89B3C}

/* ===== 响应式 ===== */
@media(max-width:480px){
  .login-container{padding:12px}
  .login-card{padding:28px 20px 32px}
  .brand h1{font-size:22px;letter-spacing:4px}
  .brand .logo{width:50px;height:50px;font-size:26px}
  .submit-btn{padding:13px;font-size:15px}
}

/* ===== 跳转横幅 ===== */
.redirect-banner{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 24px;
  background:#C23B22;
  border-bottom:2px solid #C89B3C;
  display:none;
  align-items:center;justify-content:center;gap:12px;
  font-family:'Noto Serif SC',serif;
  font-size:14px;
  color:#FBF7EF;
  animation:bannerDown .5s ease;
}
.redirect-banner.show{display:flex}
@keyframes bannerDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.redirect-banner .rb-spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#FBF7EF;
  border-radius:0;
  animation:spin .6s linear infinite;
}

/* ===== Language Switcher ===== */
.lang-switcher{
  position:fixed;top:20px;right:24px;z-index:50;
  display:flex;gap:0;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:13px;
  background:#FBF7EF;
  border:1px solid #C89B3C;
  box-shadow:1px 1px 4px rgba(44,44,44,.06);
}
.lang-switcher button{
  border:none;background:transparent;
  padding:6px 12px;cursor:pointer;
  font-family:inherit;font-size:13px;
  color:#8B7D6B;transition:all .25s;
  letter-spacing:1px;
}
.lang-switcher button:hover{color:#2C2C2C;background:rgba(200,155,60,.08)}
.lang-switcher button.active{background:#C23B22;color:#FBF7EF;font-weight:600}
.lang-switcher button:not(:last-child){border-right:1px solid #C89B3C}

/* ===== Floating Chinese Characters ===== */
.char-rain{
  position:fixed;left:0;right:0;top:0;bottom:0;z-index:1;
  pointer-events:none;overflow:hidden;
}
.char-rain .char{
  position:absolute;
  font-weight:900;
  pointer-events:none;
  user-select:none;
}
@keyframes charFloat{
  0%{transform:translateY(0) rotate(-2deg);opacity:0}
  12%{opacity:var(--oa)}
  75%{opacity:var(--oa)}
  100%{transform:translateY(calc(var(--fh)*-1)) rotate(2deg);opacity:0}
}
.char-gold{
  background:linear-gradient(135deg,#d4af37 0%,#f9e6a3 30%,#d4af37 50%,#b8860b 70%,#d4af37 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

@media(max-width:768px){
  .char-rain{display:none}
  .lang-switcher{top:12px;right:12px}
  .lang-switcher button{padding:4px 8px;font-size:12px}
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="floating-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<!-- Language Switcher -->
<div class="lang-switcher" id="langSwitcher">
  <button data-lang="zh" class="active" onclick="setLoginLang('zh')">中文</button>
  <button data-lang="en" onclick="setLoginLang('en')">English</button>
  <button data-lang="vi" onclick="setLoginLang('vi')">Tiếng Việt</button>
</div>

<!-- Floating Chinese Characters -->
<div class="char-rain" id="charRain"></div>

<!-- Redirect Banner -->
<div class="redirect-banner" id="redirectBanner">
  <div class="rb-spinner"></div>
  <span id="redirectText" data-i18n="redirect.success">登录成功，正在跳转到智慧丝路平台...</span>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Main Card -->
<div class="login-container">
  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="logo">学</div>
      <h1 data-i18n="brand.title">智慧丝路</h1>
      <p data-i18n="brand.sub">AI 驱动的一带一路汉语学习平台</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login" onclick="switchTab('login')" data-i18n="tab.login">登 录</button>
      <button class="tab-btn" data-tab="register" onclick="switchTab('register')" data-i18n="tab.register">注 册</button>
    </div>

    <!-- ===== LOGIN PANEL ===== -->
    <div class="form-panel active" id="panel-login">
      <div class="form-msg error" id="loginMsg"></div>

      <div class="form-group">
        <label data-i18n="label.username">用户名</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUser" placeholder="输入用户名（3-20位字母数字）" autocomplete="username" data-i18n-ph="ph.username">
        </div>
      </div>

      <div class="form-group">
        <label data-i18n="label.password">密码</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="loginPass" placeholder="输入密码" autocomplete="current-password" data-i18n-ph="ph.password">
          <button class="pw-toggle" onclick="togglePW('loginPass',this)" type="button" tabindex="-1">👁</button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe">
          <span class="check-box">✓</span>
          <span data-i18n="remember">记住我</span>
        </label>
        <a href="#" class="forgot-link" onclick="toast(loginT('pw.contact'),'info');return false" data-i18n="forgot">忘记密码？</a>
      </div>

      <button class="submit-btn" onclick="doLogin()" id="loginBtn">
        <span data-i18n="btn.login">登 录</span>
      </button>
    </div>

    <!-- ===== REGISTER PANEL ===== -->
    <div class="form-panel" id="panel-register">

<script>
// ===== APP STATE =====
const API_BASE = window.location.origin;
let redirectTarget = localStorage.getItem('loginRedirect') || '/';

// ===== TAB SWITCH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  // Clear errors
  document.querySelectorAll('.form-msg').forEach(m => { m.style.display = 'none'; m.textContent = ''; });
}

// ===== PASSWORD TOGGLE =====
function togglePW(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// ===== PASSWORD STRENGTH =====
function checkPWStrength(pw) {
  const bars = document.querySelectorAll('#pwStrength .bar');
  const text = document.getElementById('pwStrengthText');
  let score = 0;
  // 每项+1分，满分5
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;

  bars.forEach((b, i) => {
    b.classList.toggle('active', i < score);
  });

  const labels = ['', loginT('pw.weak'), loginT('pw.fair'), loginT('pw.good'), loginT('pw.strong'), loginT('pw.vstrong')];
  const tips = [loginT('pw.hint8'), loginT('pw.hint_long'), loginT('pw.hint_case'), loginT('pw.hint_digit'), loginT('pw.hint_sym')];
  const colors = ['', 'var(--primary)', '#f59e0b', '#10b981', '#10b981', '#10b981'];
  text.textContent = score > 0 ? loginT('pw.strength') + labels[score] : '';
  text.style.color = score > 0 ? colors[Math.min(score, 4)] : 'rgba(255,255,255,.35)';
}

// ===== TOAST =====
function toast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = msg;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ===== SHOW BANNER & REDIRECT =====
function showRedirect(msg) {
  document.getElementById('redirectText').textContent = msg || '登录成功，正在跳转...';
  document.getElementById('redirectBanner').classList.add('show');
}

function redirectAfterLogin(token, username) {
  // Save auth (兼容主站格式)
  const authData = { token: token, username: username };
  localStorage.setItem('ec_auth', JSON.stringify(authData));
  localStorage.setItem('ec_token', token);
  localStorage.setItem('ec_user', JSON.stringify({ username: username }));
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('ec_auth_remember', '1');
  }
  // Show redirect banner
  showRedirect('✅ ' + username + '，欢迎回来！正在跳转到智慧丝路平台...');
  // Redirect to main page
  setTimeout(() => {
    window.location.href = '/';
  }, 1200);
}

// ===== CHECK EXISTING SESSION =====
function checkExistingSession() {
  const stored = localStorage.getItem('ec_auth');
  if (stored) {
    try {
      const auth = JSON.parse(stored);
      if (auth && auth.token) {
        // Verify token is still valid
        fetch(API_BASE + '/api/me?token=' + encodeURIComponent(auth.token))
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              // Already logged in, redirect straight away
              showRedirect('👋 ' + data.username + '，检测到登录状态，正在跳转...');
              setTimeout(() => { window.location.href = '/'; }, 800);
            } else {
              // Token expired, clear it
              localStorage.removeItem('ec_auth');
              localStorage.removeItem('ec_auth_remember');
            }
          })
          .catch(() => { /* server might not be running yet */ });
      }
    } catch(e) {}
  }
}

// ===== LOGIN =====
function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');

  if (!user || !pass) {
    msg.textContent = loginT('err.fill');
    msg.style.display = 'flex';
    return;
  }

  btn.classList.add('loading');
  msg.style.display = 'none';

  fetch(API_BASE + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  })
  .then(r => r.json())
  .then(data => {
    btn.classList.remove('loading');
    if (data.ok) {
      redirectAfterLogin(data.token, data.username);
    } else {
      msg.textContent = '⚠️ ' + (data.error || loginT('err.login_fail').replace('⚠️ ',''));
      msg.style.display = 'flex';
      // Shake effect
      document.querySelector('#panel-login .input-wrap').style.animation = 'shake .4s ease';
      setTimeout(() => { document.querySelector('#panel-login .input-wrap').style.animation = ''; }, 500);
    }
  })
  .catch(() => {
    btn.classList.remove('loading');
    msg.textContent = loginT('err.server');
    msg.style.display = 'flex';
  });
}

// ===== REGISTER =====
function doRegister() {
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  const confirm = document.getElementById('regConfirm').value.trim();
  const msg = document.getElementById('regMsg');
  const btn = document.getElementById('regBtn');

  if (!user || !pass) {
    msg.textContent = loginT('err.fill');
    msg.style.display = 'flex';
    return;
  }
  if (user.length < 3 || user.length > 20) {
    msg.textContent = loginT('err.length');
    msg.style.display = 'flex';
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(user)) {
    msg.textContent = loginT('err.char');
    msg.style.display = 'flex';
    return;
  }
  if (pass.length < 8) {
    msg.textContent = loginT('err.pass_len');
    msg.style.display = 'flex';
    return;
  }
  if (!/[a-zA-Z]/.test(pass) || !/[0-9]/.test(pass)) {
    msg.textContent = loginT('err.pass_chars');
    msg.style.display = 'flex';
    return;
  }
  if (pass !== confirm) {
    msg.textContent = loginT('err.confirm');
    msg.style.display = 'flex';
    return;
  }

  btn.classList.add('loading');
  msg.style.display = 'none';

  fetch(API_BASE + '/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  })
  .then(r => r.json())
  .then(data => {
    btn.classList.remove('loading');
    if (data.ok) {
      redirectAfterLogin(data.token, data.username);
    } else {
      msg.textContent = '⚠️ ' + (data.error || loginT('err.register').replace('⚠️ ',''));
      msg.style.display = 'flex';
    }
  })
  .catch(() => {
    btn.classList.remove('loading');
    msg.textContent = loginT('err.server');
    msg.style.display = 'flex';
  });
}

// ===== ENTER KEY SUPPORT =====
document.addEventListener('DOMContentLoaded', () => {
  // Check session first
  checkExistingSession();

  // Enter on login fields
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
  });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loginPass').focus(); }
  });

  // Enter on register fields
  document.getElementById('regConfirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doRegister(); }
  });
  document.getElementById('regPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('regConfirm').focus(); }
  });

  // Focus first input
  setTimeout(() => { document.getElementById('loginUser').focus(); }, 400);

  // Pre-fill remembered username if available
  try {
    const stored = localStorage.getItem('ec_auth');
    if (stored) {
      const auth = JSON.parse(stored);
      if (auth && auth.username) {
        document.getElementById('loginUser').value = auth.username;
        document.getElementById('rememberMe').checked = true;
      }
    }
  } catch(e) {}
});

let loginLang = localStorage.getItem('ll_lang') || 'zh';

function loginT(key) {
  return LANG[loginLang]?.[key] || LANG['zh']?.[key] || key;
}

function applyLoginLang(lang) {
  loginLang = lang;
  localStorage.setItem('ll_lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang === 'vi' ? 'vi' : 'en';

  // Update lang switcher buttons
  document.querySelectorAll('.lang-switcher button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });

  // Apply i18n to elements with data-i18n attribute
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const raw = el.dataset.i18n;
    const m = raw.match(/^\[(\w+)\](.+)/);
    if (m) {
      const [, attr, key] = m;
      const val = loginT(key);
      if (attr === 'html') {
        el.innerHTML = val;
      } else {
        el.setAttribute(attr, val);
      }
    } else {
      el.innerHTML = loginT(raw);
    }
  });

  // Apply placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = loginT(el.dataset.i18nPh);
  });

  // Update password strength text
  const pwInput = document.getElementById('regPass');
  if (pwInput && pwInput.value) checkPWStrength(pwInput.value);
}

function setLoginLang(lang) {
  applyLoginLang(lang);
}

function pickFont(ch) {
  if (FLOAT_BRONZE.includes(ch)) {
    return Math.random() > 0.5 ? "'Noto Serif SC',serif" : "'Zhi Mang Xing','Ma Shan Zheng',cursive";
  }
  if (FLOAT_ORACLE.includes(ch)) {
    return Math.random() > 0.5 ? "'Ma Shan Zheng',cursive" : "'ZCOOL XiaoWei',serif";
  }
  if (FLOAT_COMPLEX.includes(ch)) {
    return "'ZCOOL XiaoWei','Noto Serif SC',serif";
  }
  if (FLOAT_CALLIGRAPHY.includes(ch)) {
    return Math.random() > 0.5 ? "'Liu Jian Mao Cao','Ma Shan Zheng',cursive" : "'Zhi Mang Xing',cursive";
  }
  const r = Math.random();
  if (r < 0.15) return "'Liu Jian Mao Cao','Ma Shan Zheng',cursive";       // 草书
  if (r < 0.28) return "'Zhi Mang Xing',cursive";                           // 行书
  if (r < 0.40) return "'ZCOOL QingKe HuangYou',cursive";                   // 现代艺术
  if (r < 0.52) return "'Ma Shan Zheng',cursive";                           // 行书/手写
  if (r < 0.64) return "'ZCOOL XiaoWei',serif";                             // 楷书变体
  if (r < 0.76) return "'Noto Serif SC',serif";                             // 楷书
  if (r < 0.84) return "'Noto Sans SC',sans-serif";                         // 现代黑体
  if (r < 0.90) return "KaiTi,STKaiti,'Noto Serif SC',serif";               // 系统楷体
  return "LiSu,STLiti,'Noto Serif SC',serif";                               // 系统隶书
}

function spawnDriftChar() {
  const container = document.getElementById('charRain');
  if (!container) return;

  const el = document.createElement('div');
  const ch = ELEGANT_CHARS[Math.floor(Math.random() * ELEGANT_CHARS.length)];
  el.textContent = ch;

  // Random position across full viewport
  const vx = Math.random() * 92 + 4;  // 4%-96% horizontally
  const vy = 10 + Math.random() * 75;  // 10%-85% vertically
  const isGold = Math.random() < 0.15;
  const isRed = !isGold && Math.random() < 0.20;
  const font = pickFont(ch);

  const oa = (0.06 + Math.random() * 0.10).toFixed(3);  // opacity 0.06-0.16
  const dur = 10 + Math.random() * 8;   // duration 10-18s
  const size = 40 + Math.random() * 100;  // 40px-140px
  const fh = 12 + Math.random() * 18;    // float up 12-30vh

  let colorStyle = '';
  if (isGold) {
    el.className = 'char-gold';
    colorStyle = `background:linear-gradient(135deg,#d4af37,#f9e6a3,#d4af37,#b8860b,#d4af37);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;`;
  } else if (isRed) {
    colorStyle = `color:rgba(194,59,34,${(+oa * 1.4).toFixed(3)})`;
  } else {
    colorStyle = `color:rgba(44,44,44,${oa})`;
  }

  el.style.cssText = `
    left:${vx}%;top:${vy}%;
    font-size:${size}px;
    font-family:${font};
    ${colorStyle}
    --oa:${oa};
    --fh:${fh}vh;
    animation:charFloat ${dur}s ease-out forwards;
  `;

  container.appendChild(el);
  setTimeout(() => { try { el.remove(); } catch(e) {} }, (dur + 3) * 1000);
}

// Start: initial scatter, then gentle continuous spawning
(function initChars() {
  // Scatter characters across screen immediately
  for (let i = 0; i < 12; i++) {
    setTimeout(spawnDriftChar, i * 200);
  }
  // New character every 2-3 seconds
  setInterval(spawnDriftChar, 2000 + Math.random() * 1500);
})();

// Override redirectAfterLogin to use translated messages
redirectAfterLogin = function(token, username) {
  const authData = { token: token, username: username };
  localStorage.setItem('ec_auth', JSON.stringify(authData));
  localStorage.setItem('ec_token', token);
  localStorage.setItem('ec_user', JSON.stringify({ username: username }));
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('ec_auth_remember', '1');
  }
  showRedirect('✅ ' + username + '，' + loginT('redirect.success'));
  setTimeout(() => {
    window.location.href = '/';
  }, 1200);
};

// Patch checkExistingSession to use translated messages
checkExistingSession = function() {
  const stored = localStorage.getItem('ec_auth');
  if (stored) {
    try {
      const auth = JSON.parse(stored);
      if (auth && auth.token) {
        fetch(API_BASE + '/api/me?token=' + encodeURIComponent(auth.token))
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              showRedirect('👋 ' + data.username + '，' + loginT('redirect.detect'));
              setTimeout(() => { window.location.href = '/'; }, 800);
            } else {
              localStorage.removeItem('ec_auth');
              localStorage.removeItem('ec_auth_remember');
            }
          })
          .catch(() => {});
      }
    } catch(e) {}
  }
};
