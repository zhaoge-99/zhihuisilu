<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧丝路 · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@400;700;900&family=Long+Cang&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* ===== 古风汉字风格 — 智慧丝路 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Serif SC','Ma Shan Zheng','STSong',serif;
  background:#F5F0E1;
  color:#2C2C2C;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  padding-bottom:8vh;
}

/* ===== 宣纸纹理背景 ===== */
.bg-canvas{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
  /* 宣纸纹理 — 用重复渐变模拟手工纸纤维感 */
  background:
    /* 竖纹纤维 */
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(139,119,90,.03) 2px,
      rgba(139,119,90,.03) 4px
    ),
    /* 横纹纤维 */
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(139,119,90,.02) 3px,
      rgba(139,119,90,.02) 5px
    ),
    /* 宣纸底色斑驳 */
    repeating-linear-gradient(
      45deg,
      #F5F0E1 0px,
      #F0E8D5 2px,
      #F5F0E1 4px,
      #EDE4CF 6px,
      #F5F0E1 8px
    );
  background-size: 4px 4px, 5px 5px, 8px 8px;
}

/* 大型毛笔"学"字水印装饰 */
.bg-canvas::before{
  content:'学';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-8deg);
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:360px;
  font-weight:900;
  color:rgba(194,59,34,.04);
  pointer-events:none;
  user-select:none;
  letter-spacing:0;
  line-height:1;
}

/* 隐藏原有的毛玻璃光晕和网格 */
.bg-canvas .orb{display:none}
.bg-canvas::after{display:none}

/* 浮动装饰 — 改为古风印章小点 */
.floating-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.15}
.floating-shapes .shape{
  position:absolute;border-radius:0;
  border:1px solid #C23B22;
  background:transparent;
  animation:shapeFloat 40s linear infinite;
}
.floating-shapes .shape:nth-child(1){
  width:24px;height:24px;
  top:15%;left:8%;
  border:2px solid #C23B22;
  animation-duration:35s;
  transform:rotate(45deg);
}
.floating-shapes .shape:nth-child(2){
  width:16px;height:16px;
  top:55%;left:75%;
  border:2px solid #C89B3C;
  animation-duration:40s;animation-delay:-8s;
  border-radius:50%;
}
.floating-shapes .shape:nth-child(3){
  width:20px;height:20px;
  top:8%;right:12%;
  border:2px solid #4A6C8F;
  animation-duration:30s;animation-delay:-12s;
  transform:rotate(45deg);
}
.floating-shapes .shape:nth-child(4){
  width:14px;height:14px;
  bottom:30%;left:55%;
  border:2px solid #C89B3C;
  animation-duration:38s;animation-delay:-18s;
  border-radius:50%;
}
.floating-shapes .shape:nth-child(5){
  width:18px;height:18px;
  bottom:45%;right:25%;
  border:2px solid #C23B22;
  animation-duration:32s;animation-delay:-10s;
  transform:rotate(45deg);
}
@keyframes shapeFloat{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  15%{opacity:1}
  85%{opacity:1}
  100%{transform:translateY(-120vh) rotate(360deg);opacity:0}
}

/* ===== 主卡片 — 丝路玉版 ===== */
.login-container{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  padding:12px;
}

.login-card{
  background:#FBF7EF;
  border:1px solid #C89B3C;
  border-radius:0;
  box-shadow:
    0 4px 16px rgba(44,44,44,.06),
    0 0 0 1px rgba(200,155,60,.12) inset;
  padding:28px 32px 28px;
  position:relative;
  overflow:visible;
}

/* 顶部金色细线 */
.login-card::before{
  content:'';
  position:absolute;
  top:0;left:12px;right:12px;
  height:1px;
  background:linear-gradient(90deg,transparent,#C89B3C,transparent);
  opacity:.4;
  pointer-events:none;
}

/* 底部金色细线 */
.login-card::after{
  content:'';
  position:absolute;
  bottom:0;left:12px;right:12px;
  height:1px;
  background:linear-gradient(90deg,transparent,#C89B3C,transparent);
  opacity:.4;
  pointer-events:none;
}

/* ===== 品牌标题 ===== */
.brand{
  text-align:center;margin-bottom:24px;
  position:relative;
}
.brand .logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;
  border:2px solid #C23B22;
  background:#FBF7EF;
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:32px;
  margin-bottom:14px;
  color:#C23B22;
  position:relative;
  box-shadow:2px 2px 0 rgba(194,59,34,.15);
  /* 印章效果：方形+微微倾斜 */
}
.brand h1{
  font-family:'ZCOOL QingKe HuangYou','Noto Serif SC',serif;
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#2C2C2C 0%,#5A4A3A 50%,#2C2C2C 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:6px;
  margin-bottom:4px;
}
.brand p{
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:13px;
  background:linear-gradient(135deg,#d4af37 0%,#f9e6a3 50%,#b8860b 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShimmer 4s ease infinite alternate;
  margin-top:6px;font-weight:500;
  letter-spacing:2px;
}

/* 品牌名下的装饰点 */
.brand::after{
  content:'◆';
  display:block;
  color:#C89B3C;
  font-size:8px;
  margin-top:6px;
  letter-spacing:12px;
  opacity:.6;
}
@keyframes goldShimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}

/* ===== 选项卡 ===== */
.tabs{
  display:flex;
  border-bottom:1px solid #C89B3C;
  margin-bottom:24px;
  gap:0;
}
.tab-btn{
  flex:1;padding:10px 0;
  border:none;border-radius:0;
  background:transparent;
  color:#8B7D6B;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:15px;font-weight:600;
  cursor:pointer;transition:all .3s;
  position:relative;
  letter-spacing:4px;
}
.tab-btn.active{
  color:#C23B22;
  background:transparent;
}
.tab-btn.active::after{
  content:'';
  position:absolute;bottom:-2px;left:10%;right:10%;
  height:2px;
  background:#C23B22;
}
.tab-btn:hover:not(.active){color:#2C2C2C}

/* ===== 表单面板 ===== */
.form-panel{display:none;animation:panelIn .4s ease}
.form-panel.active{display:block}
@keyframes panelIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.form-group{margin-bottom:22px;position:relative}
.form-group label{
  display:block;font-size:13px;font-weight:600;
  color:#4A6C8F;margin-bottom:8px;
  letter-spacing:2px;font-family:'Noto Serif SC',serif;
}

/* ===== 传统风格输入框 ===== */
.input-wrap{
  position:relative;
  display:flex;align-items:center;
  background:#FBF7EF;
  border:1px solid #C89B3C;
  border-radius:0;
  transition:all .3s;
  overflow:hidden;
}
.input-wrap:focus-within{
  border-color:#C23B22;
  background:#FFFCF5;
  box-shadow:inset 0 0 0 1px rgba(194,59,34,.1);
}

.input-wrap input{
  flex:1;padding:13px 14px 13px 10px;
  border:none;background:none;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:15px;
  color:#2C2C2C;outline:none;
  min-width:0;
}
.input-wrap input::placeholder{
  color:#BFB09A;
  font-family:'Noto Serif SC',serif;
}
.input-wrap input:-webkit-autofill,
.input-wrap input:-webkit-autofill:hover,
.input-wrap input:-webkit-autofill:focus{
  -webkit-text-fill-color:#2C2C2C;
  -webkit-box-shadow:0 0 0 1000px #FFFCF5 inset;
  transition:background-color 5000s;
}

/* 密码切换按钮 */
.pw-toggle{
  padding:0 14px 0 4px;
  background:none;border:none;
  cursor:pointer;font-size:14px;
  color:#BFB09A;
  transition:color .3s;
  flex-shrink:0;
}
.pw-toggle:hover{color:#C23B22}

/* ===== 密码强度条（朱红→金色渐变） ===== */
.pw-strength{
  display:flex;gap:3px;margin-top:10px;
  height:4px;
}
.pw-strength .bar{
  flex:1;height:100%;border-radius:0;
  background:#E5DDCF;
  transition:all .3s;
}
/* 密码强度：朱红到金色渐变 — 从左到右依次加深 */
.pw-strength .bar.active{background:#C23B22}
.pw-strength .bar.active:nth-child(2){background:#BD4428}
.pw-strength .bar.active:nth-child(3){background:#C2642A}
.pw-strength .bar.active:nth-child(4){background:#C89B3C}
.pw-strength-text{
  font-size:12px;color:#8B7D6B;margin-top:6px;
  min-height:18px;transition:color .3s;
  font-family:'Noto Serif SC',serif;
}

/* ===== 表单选项 ===== */
.form-options{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.remember-me{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;font-size:13px;color:#4A6C8F;
  user-select:none;font-family:'Noto Serif SC',serif;
}
.remember-me input[type="checkbox"]{
  display:none;
}
.remember-me .check-box{
  width:18px;height:18px;border-radius:2px;
  border:1px solid #C89B3C;
  background:#FBF7EF;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;flex-shrink:0;
  font-size:10px;color:transparent;
  font-family:serif;
}
.remember-me input:checked + .check-box{
  background:#C23B22;
  border-color:#C23B22;
  color:#FBF7EF;
}

.forgot-link{
  font-size:13px;color:#8B7D6B;
  text-decoration:none;transition:color .3s;
  font-family:'Noto Serif SC',serif;
}
.forgot-link:hover{color:#C23B22}

/* ===== 语言选择器（表单内）===== */
.lang-select-group{margin-bottom:18px}
.lang-select-input{
  flex:1;padding:13px 14px;
  border:none;background:none;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:15px;
  color:#2C2C2C;outline:none;
  cursor:pointer;
  min-width:0;
  appearance:auto;
}
.lang-select-input option{
  font-family:'Noto Serif SC',serif;
  font-size:14px;
  color:#2C2C2C;
  background:#FBF7EF;
}

/* ===== 朱红直角按钮 ===== */
.submit-btn{
  width:100%;padding:15px;
  border:2px solid #C23B22;
  border-radius:0;
  font-family:'Noto Serif SC','Ma Shan Zheng',serif;
  font-size:16px;font-weight:700;
  color:#FBF7EF;
  background:#C23B22;
  cursor:pointer;
  transition:all .3s;
  position:relative;
  overflow:hidden;
  letter-spacing:6px;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;
  background:#A8321E;
  opacity:0;transition:opacity .4s;
}
.submit-btn:hover::before{opacity:1}
.submit-btn:hover{
  background:#A8321E;
  box-shadow:2px 2px 0 rgba(44,44,44,.15);
}
.submit-btn:active{
  transform:translate(1px,1px);
  box-shadow:none;
}
.submit-btn span{position:relative;z-index:1}
.submit-btn.loading span{opacity:0}
.submit-btn.loading::after{
  content:'';position:absolute;z-index:2;
  top:50%;left:50%;
  width:20px;height:20px;margin:-10px 0 0 -10px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#FBF7EF;
  border-radius:0;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 信息提示 ===== */
.form-msg{
  display:none;
  padding:10px 14px;border-radius:0;
  font-size:13px;margin-bottom:16px;
  animation:msgSlide .3s ease;
  font-family:'Noto Serif SC',serif;
}
.form-msg.error{
  display:flex;align-items:center;gap:8px;
  background:rgba(194,59,34,.08);
  border:1px solid rgba(194,59,34,.2);
  color:#C23B22;
}
.form-msg.success{
  display:flex;align-items:center;gap:8px;
  background:rgba(74,108,143,.08);
  border:1px solid rgba(74,108,143,.2);
  color:#4A6C8F;
}
@keyframes msgSlide{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== 底部文字 ===== */
.footer-text{
  text-align:center;margin-top:20px;
  font-size:13px;color:#8B7D6B;
  font-family:'Noto Serif SC',serif;
}
.footer-text a{
  color:#C23B22;
  text-decoration:none;font-weight:500;
  transition:color .3s;
}
.footer-text a:hover{color:#A8321E}

/* ===== 印章装饰（注册面板右侧） ===== */
#panel-register .form-group:last-of-type::after{
  content:'印';
  position:absolute;right:-20px;top:50%;
  transform:translateY(-50%) rotate(12deg);
  font-family:'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive;
  font-size:14px;
  color:#C23B22;
  border:2px solid #C23B22;
  padding:4px 2px;
  line-height:1;
  opacity:.5;
  pointer-events:none;
}

/* ===== Toast 通知 ===== */
.toast-container{
  position:fixed;top:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:14px 20px;border-radius:0;
  background:#FBF7EF;
  border:1px solid #C89B3C;
  font-family:'Noto Serif SC',serif;
  font-size:14px;font-weight:500;
  color:#2C2C2C;
  display:flex;align-items:center;gap:10px;
  animation:toastIn .4s ease;
  max-width:380px;
  box-shadow:2px 2px 8px rgba(44,44,44,.1);
}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
.toast.success{border-left:3px solid #4A6C8F}
.toast.error{border-left:3px solid #C23B22}
.toast.info{border-left:3px solid #C89B3C}

/* ===== 响应式 ===== */
@media(max-width:480px){
  .login-container{padding:12px}
  .login-card{padding:28px 20px 32px}
  .brand h1{font-size:22px;letter-spacing:4px}
  .brand .logo{width:50px;height:50px;font-size:26px}
  .submit-btn{padding:13px;font-size:15px}
}

/* ===== 跳转横幅 ===== */
.redirect-banner{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 24px;
  background:#C23B22;
  border-bottom:2px solid #C89B3C;
  display:none;
  align-items:center;justify-content:center;gap:12px;
  font-family:'Noto Serif SC',serif;
  font-size:14px;
  color:#FBF7EF;
  animation:bannerDown .5s ease;
}
.redirect-banner.show{display:flex}
@keyframes bannerDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.redirect-banner .rb-spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#FBF7EF;
  border-radius:0;
  animation:spin .6s linear infinite;
}

/* ===== Floating Chinese Characters ===== */
.char-rain{
  position:fixed;left:0;right:0;top:0;bottom:0;z-index:1;
  pointer-events:none;overflow:hidden;
}
.char-rain .char{
  position:fixed;
  font-weight:900;
  pointer-events:none;
  user-select:none;
}
@keyframes charFloat{
  0%{transform:translateY(0) rotate(-2deg);opacity:0}
  12%{opacity:var(--oa)}
  75%{opacity:var(--oa)}
  100%{transform:translateY(calc(var(--fh)*-1)) rotate(2deg);opacity:0}
}

/* ===== Silk Road Trade Route ===== */
.silk-route{
  position:fixed;left:0;right:0;top:0;bottom:0;z-index:0;
  pointer-events:none;overflow:hidden;
}
.silk-route svg{width:100%;height:100%}
.route-dot{
  fill:#C89B3C;
  opacity:0;
}
@keyframes dotTravel1{
  0%{opacity:0}
  5%{opacity:.7}
  90%{opacity:.7}
  100%{opacity:0}
}
@keyframes dotTravel2{
  0%{opacity:0}
  5%{opacity:.55}
  90%{opacity:.55}
  100%{opacity:0}
}

@media(max-width:768px){
  .char-rain{display:none}
  .silk-route{display:none}
  .lang-select-group .lang-select-input{font-size:13px;padding:11px 10px}
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="floating-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<!-- Floating Chinese Characters -->
<div class="char-rain" id="charRain"></div>

<!-- Silk Road Trade Route -->
<div class="silk-route" id="silkRoute" aria-hidden="true">
  <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- Gradient for the route -->
      <linearGradient id="routeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#C89B3C" stop-opacity="0" />
        <stop offset="8%" stop-color="#C89B3C" stop-opacity=".35" />
        <stop offset="50%" stop-color="#C89B3C" stop-opacity=".5" />
        <stop offset="92%" stop-color="#C89B3C" stop-opacity=".35" />
        <stop offset="100%" stop-color="#C89B3C" stop-opacity="0" />
      </linearGradient>
      <!-- Mountain silhouette -->
      <linearGradient id="mountGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#8B7D6B" stop-opacity=".12" />
        <stop offset="100%" stop-color="#8B7D6B" stop-opacity=".04" />
      </linearGradient>
      <!-- Sand dune -->
      <linearGradient id="duneGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C89B3C" stop-opacity=".06" />
        <stop offset="100%" stop-color="#C89B3C" stop-opacity="0" />
      </linearGradient>
    </defs>

    <!-- Background: desert/sand dunes -->
    <path d="M 0,420 Q 150,380 300,410 Q 450,440 600,400 Q 750,370 1000,410 L 1000,600 L 0,600 Z" fill="url(#duneGrad)" />
    <path d="M 0,450 Q 200,420 400,440 Q 600,460 800,430 Q 900,420 1000,440 L 1000,600 L 0,600 Z" fill="url(#duneGrad)" />

    <!-- Mountain range (north) -->
    <path d="M 0,200 L 40,140 L 80,180 L 130,120 L 180,170 L 230,100 L 280,160 L 320,130 L 360,180 L 400,150 L 440,200"
          fill="none" stroke="url(#mountGrad)" stroke-width="3" stroke-linejoin="round" />
    <path d="M 600,180 L 640,120 L 680,160 L 730,100 L 780,150 L 830,130 L 880,170 L 920,140 L 960,190 L 1000,160"
          fill="none" stroke="url(#mountGrad)" stroke-width="3" stroke-linejoin="round" />

    <!-- Title: 丝绸之路 in large calligraphy -->
    <text x="50%" y="120" text-anchor="middle"
          font-family="'Ma Shan Zheng','ZCOOL QingKe HuangYou',cursive"
          font-size="48" fill="#C89B3C" opacity=".08"
          transform="rotate(-3, 500, 120)">丝绸之路</text>

    <!-- Main Silk Road route -->
    <path d="M 50,340 Q 140,310 220,300 Q 320,270 400,280 Q 470,300 540,270 Q 620,240 700,255 Q 790,280 870,250 Q 930,230 1000,240"
          fill="none" stroke="url(#routeGrad)" stroke-width="2.5" stroke-dasharray="6,12" stroke-linecap="round" />

    <!-- Branch route (Southern Silk Road) -->
    <path d="M 220,300 Q 280,360 360,380 Q 440,400 520,370 Q 590,340 670,360 Q 750,390 830,350 Q 910,320 1000,330"
          fill="none" stroke="url(#routeGrad)" stroke-width="1.5" stroke-dasharray="4,14" stroke-linecap="round" />

    <!-- Animated camel traveler dots on main route -->

<script>
// ===== APP STATE =====
const API_BASE = window.location.origin;
// Read redirect target from query param or localStorage
const urlParams = new URLSearchParams(window.location.search);
let redirectTarget = urlParams.get('redirect') || localStorage.getItem('loginRedirect') || '/';

// ===== TAB SWITCH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  // Clear errors
  document.querySelectorAll('.form-msg').forEach(m => { m.style.display = 'none'; m.textContent = ''; });
}

// ===== PASSWORD TOGGLE =====
function togglePW(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// ===== PASSWORD STRENGTH =====
function checkPWStrength(pw) {
  const bars = document.querySelectorAll('#pwStrength .bar');
  const text = document.getElementById('pwStrengthText');
  let score = 0;
  // 每项+1分，满分5
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;

  bars.forEach((b, i) => {
    b.classList.toggle('active', i < score);
  });

  const labels = ['', loginT('pw.weak'), loginT('pw.fair'), loginT('pw.good'), loginT('pw.strong'), loginT('pw.vstrong')];
  const tips = [loginT('pw.hint8'), loginT('pw.hint_long'), loginT('pw.hint_case'), loginT('pw.hint_digit'), loginT('pw.hint_sym')];
  const colors = ['', 'var(--primary)', '#f59e0b', '#10b981', '#10b981', '#10b981'];
  text.textContent = score > 0 ? loginT('pw.strength') + labels[score] : '';
  text.style.color = score > 0 ? colors[Math.min(score, 4)] : 'rgba(255,255,255,.35)';
}

// ===== TOAST =====
function toast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = msg;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ===== SHOW BANNER & REDIRECT =====
function showRedirect(msg) {
  document.getElementById('redirectText').textContent = msg || loginT('login.redirecting');
  document.getElementById('redirectBanner').classList.add('show');
}

function redirectAfterLogin(token, username) {
  // Save auth (兼容主站格式)
  const authData = { token: token, username: username };
  localStorage.setItem('ec_auth', JSON.stringify(authData));
  localStorage.setItem('ec_token', token);
  localStorage.setItem('ec_user', JSON.stringify({ username: username }));
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('ec_auth_remember', '1');
  }
  // Show redirect banner
  showRedirect('✅ ' + username + '，欢迎回来！正在跳转到智慧丝路平台...');
  // Redirect to return page
  setTimeout(() => {
    window.location.href = redirectTarget;
  }, 1200);
}

// ===== CHECK EXISTING SESSION =====
function checkExistingSession() {
  const stored = localStorage.getItem('ec_auth');
  if (stored) {
    try {
      const auth = JSON.parse(stored);
      if (auth && auth.token) {
        // Verify token is still valid
        fetch(API_BASE + '/api/me?token=' + encodeURIComponent(auth.token))
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              // Already logged in, redirect straight away
              showRedirect('👋 ' + data.username + '，检测到登录状态，正在跳转...');
              setTimeout(() => { window.location.href = '/'; }, 800);
            } else {
              // Token expired, clear it
              localStorage.removeItem('ec_auth');
              localStorage.removeItem('ec_auth_remember');
            }
          })
          .catch(() => { /* server might not be running yet */ });
      }
    } catch(e) {}
  }
}

// ===== LOGIN =====
function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');

  if (!user || !pass) {
    msg.textContent = loginT('err.fill');
    msg.style.display = 'flex';
    return;
  }

  btn.classList.add('loading');
  msg.style.display = 'none';

  fetch(API_BASE + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  })
  .then(r => r.json())
  .then(data => {
    btn.classList.remove('loading');
    if (data.ok) {
      localStorage.setItem('ec_lang', loginLang);
      redirectAfterLogin(data.token, data.username);
    } else {
      msg.textContent = '⚠️ ' + (data.error || loginT('err.login_fail').replace('⚠️ ',''));
      msg.style.display = 'flex';
      // Shake effect
      document.querySelector('#panel-login .input-wrap').style.animation = 'shake .4s ease';
      setTimeout(() => { document.querySelector('#panel-login .input-wrap').style.animation = ''; }, 500);
    }
  })
  .catch(() => {
    btn.classList.remove('loading');
    msg.textContent = loginT('err.server');
    msg.style.display = 'flex';
  });
}

// ===== REGISTER =====
function doRegister() {
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  const confirm = document.getElementById('regConfirm').value.trim();
  const msg = document.getElementById('regMsg');
  const btn = document.getElementById('regBtn');

  if (!user || !pass) {
    msg.textContent = loginT('err.fill');
    msg.style.display = 'flex';
    return;
  }
  if (user.length < 3 || user.length > 20) {
    msg.textContent = loginT('err.length');
    msg.style.display = 'flex';
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(user)) {
    msg.textContent = loginT('err.char');
    msg.style.display = 'flex';
    return;
  }
  if (pass.length < 8) {
    msg.textContent = loginT('err.pass_len');
    msg.style.display = 'flex';
    return;
  }
  if (!/[a-zA-Z]/.test(pass) || !/[0-9]/.test(pass)) {
    msg.textContent = loginT('err.pass_chars');
    msg.style.display = 'flex';
    return;
  }
  if (pass !== confirm) {
    msg.textContent = loginT('err.confirm');
    msg.style.display = 'flex';
    return;
  }

  btn.classList.add('loading');
  msg.style.display = 'none';

  fetch(API_BASE + '/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  })
  .then(r => r.json())
  .then(data => {
    btn.classList.remove('loading');
    if (data.ok) {
      // Registration success, go to login with language
      localStorage.setItem('ec_lang', loginLang);
      showRedirect('✅ ' + loginT('register.success') + ' ' + data.username + '，' + loginT('register.please_login'));
      setTimeout(() => {
        window.location.href = '/login?redirect=' + encodeURIComponent(redirectTarget);
      }, 1200);
    } else {
      msg.textContent = '⚠️ ' + (data.error || loginT('err.register').replace('⚠️ ',''));
      msg.style.display = 'flex';
    }
  })
  .catch(() => {
    btn.classList.remove('loading');
    msg.textContent = loginT('err.server');
    msg.style.display = 'flex';
  });
}

// ===== ENTER KEY SUPPORT =====
document.addEventListener('DOMContentLoaded', () => {
  // Check session first
  checkExistingSession();

  // Apply saved language preference
  applyLoginLang(loginLang);

  // Bind language selector change event
  document.getElementById('langSelect').addEventListener('change', function() {
    setLoginLang(this.value);
  });

  // Enter on login fields
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
  });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loginPass').focus(); }
  });

  // Enter on register fields
  document.getElementById('regConfirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doRegister(); }
  });
  document.getElementById('regPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('regConfirm').focus(); }
  });

  // Focus first input
  setTimeout(() => { document.getElementById('loginUser').focus(); }, 400);

  // Pre-fill remembered username if available
  try {
    const stored = localStorage.getItem('ec_auth');
    if (stored) {
      const auth = JSON.parse(stored);
      if (auth && auth.username) {
        document.getElementById('loginUser').value = auth.username;
        document.getElementById('rememberMe').checked = true;
      }
    }
  } catch(e) {}
});

let loginLang = localStorage.getItem('ll_lang') || localStorage.getItem('ec_lang') || 'zh';

function loginT(key) {
  return LANG[loginLang]?.[key] || LANG['zh']?.[key] || LANG['en']?.[key] || key;
}

function applyLoginLang(lang) {
  loginLang = lang;
  localStorage.setItem('ll_lang', lang);
  localStorage.setItem('ec_lang', lang);  // sync to main page
  const langMap = {'zh':'zh-CN','en':'en','vi':'vi','ru':'ru','ja':'ja','ko':'ko','es':'es','fr':'fr','de':'de'};
  document.documentElement.lang = langMap[lang] || 'en';

  // Update lang selector
  const sel = document.getElementById('langSelect');
  if (sel) sel.value = lang;

  // Apply i18n to elements with data-i18n attribute
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const raw = el.dataset.i18n;
    const m = raw.match(/^\[(\w+)\](.+)/);
    if (m) {
      const [, attr, key] = m;
      const val = loginT(key);
      if (attr === 'html') {
        el.innerHTML = val;
      } else {
        el.setAttribute(attr, val);
      }
    } else {
      el.textContent = loginT(raw);
    }
  });

  // Apply placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = loginT(el.dataset.i18nPh);
  });

  // Update password strength text
  const pwInput = document.getElementById('regPass');
  if (pwInput && pwInput.value) checkPWStrength(pwInput.value);
}

const FLOAT_COMPLEX = ['龍','鬱','爨','籲','鸞','麤','灦','纛','靈','鑫','灥','猋','犇','鱻','麤','龘','驫','馫','靐','灩','欝','驪','鱗','鼐','齉','囍','醴','釁','饗','鑾','懿','嬴','襄','譽','戀','懿','灝','讓','竊','顯'];

const FLOAT_CALLIGRAPHY = ['永','和','九','年','岁','癸','丑','暮','春','之','初','会','稽','山','阴','兰','亭','修','禊','群','贤','毕','至','少','长','咸','集','崇','峻','茂','修','竹','清','流','激','湍','映','带','左','右','引','以','为','流','觞','曲','水','列','坐','其','次','虽','无','丝','竹','管','弦','之','盛','一','觞','一','咏','亦','足','以','畅','叙','幽','情','是','日','也','天','朗','气','清','惠','风','和','畅'];

function pickFont(ch) {
  if (FLOAT_BRONZE.includes(ch)) {
    return Math.random() > 0.5 ? "'Noto Serif SC',serif" : "'Zhi Mang Xing','Ma Shan Zheng',cursive";
  }
  if (FLOAT_ORACLE.includes(ch)) {
    return Math.random() > 0.5 ? "'Ma Shan Zheng',cursive" : "'ZCOOL XiaoWei',serif";
  }
  if (FLOAT_COMPLEX.includes(ch)) {
    return "'ZCOOL XiaoWei','Noto Serif SC',serif";
  }
  if (FLOAT_CALLIGRAPHY.includes(ch)) {
    return Math.random() > 0.5 ? "'Liu Jian Mao Cao','Ma Shan Zheng',cursive" : "'Zhi Mang Xing',cursive";
  }
  // 13 font styles across 6 calligraphy traditions
  const r = Math.random();
  if (r < 0.10) return "'Liu Jian Mao Cao','Ma Shan Zheng',cursive";         // 狂草
  if (r < 0.18) return "'Zhi Mang Xing',cursive";                             // 行书
  if (r < 0.26) return "'Long Cang','Ma Shan Zheng',cursive";                 // 手写体
  if (r < 0.34) return "'ZCOOL QingKe HuangYou',cursive";                     // 现代艺术
  if (r < 0.42) return "'Ma Shan Zheng',cursive";                             // 行草
  if (r < 0.50) return "'ZCOOL KuaiLe',cursive";                              // 可爱体
  if (r < 0.58) return "'ZCOOL XiaoWei',serif";                               // 楷书变体
  if (r < 0.66) return "'Noto Serif SC',serif";                               // 标准楷书
  if (r < 0.74) return "'Noto Sans SC',sans-serif";                           // 现代黑体
  if (r < 0.80) return "KaiTi,STKaiti,'Noto Serif SC',serif";                 // 系统楷体
  if (r < 0.86) return "LiSu,STLiti,'Noto Serif SC',serif";                   // 系统隶书
  if (r < 0.93) return "'ZCOOL KuaiLe','Noto Sans SC',sans-serif";            // 可爱+黑体混搭
  return "'Long Cang','Ma Shan Zheng',cursive";                               // 手写回退
}

function spawnDriftChar() {
  const container = document.getElementById('charRain');
  if (!container) return;

  const el = document.createElement('div');
  const ch = ELEGANT_CHARS[Math.floor(Math.random() * ELEGANT_CHARS.length)];
  el.textContent = ch;

  // Random position across full viewport
  const vx = Math.random() * 92 + 4;  // 4%-96% horizontally
  const vy = 10 + Math.random() * 75;  // 10%-85% vertically
  const isGold = false;
  const isRed = false;
  const font = pickFont(ch);

  const oa = (0.15 + Math.random() * 0.18).toFixed(3);  // opacity 0.15-0.33
  const dur = 6 + Math.random() * 4;   // duration 6-10s
  const size = 20 + Math.random() * 70;  // 20px-90px
  const fh = 15 + Math.random() * 20;    // float up 15-35vh

  let colorStyle = `color:rgba(44,44,44,${oa})`;
  el.className = 'char';

  // Extra font variety: random weight + spacing
  const wChoice = Math.random();
  const fontWeight = wChoice < 0.25 ? '400' : wChoice < 0.55 ? '700' : wChoice < 0.80 ? '900' : '100';
  const letterSpacing = Math.random() < 0.3 ? `${(Math.random() * 6 + 2).toFixed(0)}px` : 'normal';
  const extraStyle = fontWeight !== '400' ? `font-weight:${fontWeight};` : '';
  const spacingStyle = letterSpacing !== 'normal' ? `letter-spacing:${letterSpacing};` : '';

  el.style.cssText = `
    position:fixed;left:${vx}%;top:${vy}%;
    font-size:${size}px;
    font-family:${font};
    ${extraStyle}${spacingStyle}
    ${colorStyle}
    --oa:${oa};
    --fh:${fh}vh;
    animation:charFloat ${dur}s ease-out forwards;
  `;

  container.appendChild(el);
  setTimeout(() => { try { el.remove(); } catch(e) {} }, (dur + 3) * 1000);
}

// Start: initial scatter, then gentle continuous spawning
(function initChars() {
  // Scatter characters across screen immediately
  for (let i = 0; i < 30; i++) {
    setTimeout(spawnDriftChar, i * 100);
  }
  // Continuous spawn: 3-5 per wave every 800ms
  setInterval(() => {
    const n = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) setTimeout(spawnDriftChar, i * 50);
  }, 800);
})();

// Override redirectAfterLogin to use translated messages
redirectAfterLogin = function(token, username) {
  const authData = { token: token, username: username };
  localStorage.setItem('ec_auth', JSON.stringify(authData));
  localStorage.setItem('ec_token', token);
  localStorage.setItem('ec_user', JSON.stringify({ username: username }));
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('ec_auth_remember', '1');
  }
  showRedirect('✅ ' + username + '，' + loginT('redirect.success'));
  setTimeout(() => {
    window.location.href = redirectTarget;
  }, 1200);
};

// Patch checkExistingSession to use translated messages
checkExistingSession = function() {
  const stored = localStorage.getItem('ec_auth');
  if (stored) {
    try {
      const auth = JSON.parse(stored);
      if (auth && auth.token) {
        fetch(API_BASE + '/api/me?token=' + encodeURIComponent(auth.token))
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              showRedirect('👋 ' + data.username + '，' + loginT('redirect.detect'));
              setTimeout(() => { window.location.href = '/'; }, 800);
            } else {
              localStorage.removeItem('ec_auth');
              localStorage.removeItem('ec_auth_remember');
            }
          })
          .catch(() => {});
      }
    } catch(e) {}
  }
};
