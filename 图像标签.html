<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
<!-- 图片标签的格式为<img src="" alt="" width="" height="">,scr代表图片的位置和名称，是图片标签的必须属性/参数，
 alt的作用是当图片因网速慢或其他原因（图片路径写错）显示不出来时，
 本该显示图片的位置会显示某些文字，title的作用是给出显示词，width和height分别代表图片的宽和长，没有单位 -->
<!-- 属性之间必须以空格隔开，且属性之间没有顺序之分，标签名和属性之间必须以空格隔开，属性必须写在开始标签里，标签上可以同时存在多个属性 -->
<!-- 如果只设置了width和height其中的一个，那么另一个会等比例的缩放 -->

</body>
</html>
