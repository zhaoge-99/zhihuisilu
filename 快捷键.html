<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷键</title>
</head>
<body>
 <!-- tab是缩进,shift+tab是取消缩进,即前者光标跟着代码向后移动,即缩进，后者光标跟着代码向前移动，即取消缩进   --> <br>
 <!-- ctrl+s是保存 --> <br>
  <!--ctrl+/是注释，不会被浏览器识别  ，将光标放在这一行的任意位置，按它，这一行的内容就会被注释起来--> <br>
  <!-- 光标放在某一行的任意位置，按ctrl+c就可以复制此行内容，接着按ctrl+v就可以粘贴下来，ctrl+x是剪切，光标放在某一行，
   然后按它，就可以将这行内容剪切下来，而且这行内容会消失，随后按ctrl+v即可粘贴下来 -->
<!-- ./代表当前目录下 -->
</body>
</html>
